<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Charset MUST be the first element in <head> -->
  <meta charset="UTF-8">

  <!-- Page title block allows child templates to override -->
  <title>{% block title %}PDMS{% endblock %}</title>

  <!-- Responsive design for mobile devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* Basic styling for layout and navigation */
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      margin: 0;
      padding: 0;
    }
    header {
      background: #007bff;
      color: #fff;
      padding: 15px;
      text-align: center;
    }
    nav {
      background: #0056b3;
      padding: 10px;
      text-align: center;
    }
    nav a {
      color: #fff;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }
    nav a:hover {
      text-decoration: underline;
    }
    .container {
      padding: 30px;
      max-width: 900px;
      margin: auto;
    }
    footer {
      background: #007bff;
      color: #fff;
      text-align: center;
      padding: 10px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>
  <!-- Global header -->
  <header>
    <h1>Product Development Management System</h1>
  </header>

  <!-- Navigation bar -->
  <nav>
    <!-- Use URL names defined in pdms_app/urls.py -->
    <a href="{% url 'home' %}">Home</a>
    <a href="{% url 'download_page' %}">Downloads</a>
    <a href="{% url 'about' %}">About</a>
    <a href="/admin/">Admin</a>
  </nav>

  <!-- Main content area -->
  <div class="container">
    {% block content %}
    <!-- Child templates inject their content here -->
    {% endblock %}
  </div>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 PDMS Project</p>
  </footer>
</body>
</html>
